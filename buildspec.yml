version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies
      - npm install

  build:
    commands:
      - echo Build completed

  post_build:
    commands:
      - echo Setting up SSH key
      - echo "$EC2_KEY" > key.pem
      - chmod 400 key.pem

      - echo Deploying to EC2
      - ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@13.60.214.253'
          if [ ! -d "poc22-nodejs-app" ]; then
            git clone https://github.com/Ironman680-0202/poc_22.git;
          fi
          cd poc22-nodejs-app &&
          git pull &&
          npm install &&
          pkill node || true &&
          nohup node app.js > app.log 2>&1 & 
        '